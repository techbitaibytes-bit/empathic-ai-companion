  <text x="355" y="402" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" font-size="15" fill="#c4b5fd" text-anchor="middle">Mood Mirror</text>
  <rect x="446" y="378" width="170" height="36" rx="18" fill="#4c1d95" fill-opacity="0.6"/>
  <text x="531" y="402" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" font-size="15" fill="#c4b5fd" text-anchor="middle">Healing Toolkit</text>
