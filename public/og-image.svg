  <path d="M180 323 C180 323 165 312 165 304 C165 299 169 295 174 295 C177 295 179 297 180 298 C181 297 183 295 186 295 C191 295 195 299 195 304 C195 312 180 323 180 323Z" fill="white" fill-opacity="0.9"/>
